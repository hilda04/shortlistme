AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ShortlistMe backend stack (SAM)

Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173
  JwtIssuer:
    Type: String
    Default: https://example.auth.us-east-1.amazoncognito.com
  JwtAudience:
    Type: String
    Default: shortlistme-client-id

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        ANALYSES_TABLE_NAME: !Ref AnalysesTable
        ARTIFACTS_BUCKET_NAME: !Ref ArtifactsBucket
        MAX_UPLOAD_BYTES: 5242880
        ALLOWED_ORIGIN: !Ref AllowedOrigin

Resources:
  ShortlistMeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Ref JwtIssuer
              audience:
                - !Ref JwtAudience
            IdentitySource: "$request.header.Authorization"

  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalysesTable
        - S3CrudPolicy:
            BucketName: !Ref ArtifactsBucket
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /health
            Method: GET
        Roles:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /roles
            Method: GET
        Me:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /me
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuthorizer
        UploadPresign:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /uploads/presign
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer
        CreateAnalysis:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /analyses
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer
        ListAnalyses:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /analyses
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuthorizer
        GetAnalysis:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /analyses/{analysisId}
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuthorizer
        DownloadAnalysis:
          Type: HttpApi
          Properties:
            ApiId: !Ref ShortlistMeApi
            Path: /analyses/{analysisId}/download/{type}
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuthorizer

  AnalysesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${ShortlistMeApi}.execute-api.${AWS::Region}.amazonaws.com"
  AnalysesTableName:
    Value: !Ref AnalysesTable
  ArtifactsBucketName:
    Value: !Ref ArtifactsBucket
